version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: railway_db
    environment:
      POSTGRES_USER: railway
      POSTGRES_PASSWORD: railway123
      POSTGRES_DB: railway_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railway -d railway_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railway_backend
    environment:
      DATABASE_URL: postgresql://railway:railway123@db:5432/railway_copilot
      SECRET_KEY: supersecretkey-change-in-production-32chars
      DATASET_PATH: /app/data/railway_operations.csv
      MODELS_DIR: /app/models
    volumes:
      - ./data:/app/data:ro
      - model_cache:/app/models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: railway_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  model_cache:
