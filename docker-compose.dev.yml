version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: railway_db_dev
    environment:
      POSTGRES_USER: railway
      POSTGRES_PASSWORD: railway123
      POSTGRES_DB: railway_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railway -d railway_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railway_backend_dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://railway:railway123@db:5432/railway_copilot
      SECRET_KEY: devsecretkey
      DATASET_PATH: /app/data/railway_operations.csv
      MODELS_DIR: /app/models
    volumes:
      - ./backend:/app
      - ./data:/app/data:ro
      - model_cache_dev:/app/models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: railway_frontend_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data_dev:
  model_cache_dev:
